<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment | Global Derma Bahrain</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="src/styles.css?v=8" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/Demo-Gd/"><span class="brand-mark"><img src="/Demo-Gd/assets/images/Logo.png" alt="" /></span><span><strong>Global Derma</strong><small>Dermatology + Pathology</small></span></a>
      <nav class="nav-links"><a href="/Demo-Gd/">Home</a><a href="/Demo-Gd/dermatology.html">Dermatology</a><a href="/Demo-Gd/pathology.html">Pathology</a><a href="/Demo-Gd/doctors.html">Doctors</a><a href="/Demo-Gd/booking.html">Book</a><a href="/Demo-Gd/portal.html">Portal</a></nav>
      <div class="language-switch" aria-label="Language"><a class="active" href="/Demo-Gd/booking.html">EN</a><a href="/Demo-Gd/ar/booking.html">AR</a></div>
      <a class="nav-cta" href="/Demo-Gd/booking.html">Request Visit</a>
    </header>
    <main>
      <section class="booking-page">
        <div><p class="eyebrow">Your first step</p><h1>Start with a conversation about your skin.</h1><img loading="lazy" src="assets/images/reception.png" alt="Reception area for appointment requests" /></div>
        <form class="booking-panel">
          <label>Visit type<select id="visitType"><option>Dermatology consultation</option><option>Cosmetic dermatology</option><option>Pathology service</option><option>Results review</option></select></label>
          <label>Preferred doctor<select id="doctor"><option>First available</option><option>Dr Husain Juma</option><option>Dr Majeda Almemari</option><option>Dr Rishi Hasan</option></select></label>
          <label>Preferred date<input type="date" /></label>
          <label>Mobile number<input type="tel" value="+973 " /></label>
          <label>Reason for visit<textarea placeholder="Tell us briefly what you need help with"></textarea></label>
          <button class="button primary" type="button" id="previewBtn">Preview request</button>
          <p class="booking-result" id="bookingResult">Request summary will appear here.</p>
        </form>
      </section>
    </main>
    <footer class="footer"><div><strong>Global Derma</strong><span> Dermatology + Pathology in Bahrain</span></div><nav class="footer-links" aria-label="Footer navigation"><a href="/Demo-Gd/">Home</a><a href="dermatology.html">Dermatology</a><a href="pathology.html">Pathology</a><a href="portal.html">Patient access</a></nav></footer>
    <script type="module" src="src/main.js?v=8"></script>
  </body>
</html>
